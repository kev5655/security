# --- MAIN CONTEXT ---
# Define the user and worker processes (standard defaults)
user  nginx;
worker_processes  auto;

# Where to store Nginx error logs and the process ID
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

# The events block is required for Nginx to run
events {
    worker_connections  1024;
}

# --- HTTP CONTEXT ---
http {
    # Include standard MIME types so browsers know how to render files
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. Define the custom log format with latency variables
    log_format timed_combined '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              'request_time=$request_time '
                              'upstream_response_time=$upstream_response_time '
                              'upstream_connect_time=$upstream_connect_time';

    # 2. Apply the custom format to the main access log
    access_log  /var/log/nginx/access.log  timed_combined;

    # Basic network optimization settings
    sendfile        on;
    keepalive_timeout  65;

    # --- SERVER CONTEXT ---
    # 3. A basic server block listening on port 80
    server {
        listen       80;
        server_name  localhost;

        # Serve the default Nginx index page
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        # Handle errors gracefully
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}